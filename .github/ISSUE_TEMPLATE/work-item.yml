name: Work item
description: Planned package task or maintenance item.
title: "[WORK]: "
body:
  - type: input
    id: summary
    attributes:
      label: Summary line
      description: One sentence describing the task.
      placeholder: Add a reusable logo mask sampling helper.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Poke model
        - Material preset
        - R3F component/API
        - Grass instances
        - Uniform helpers
        - Accessibility/reduced motion
        - Tests
        - Docs
        - CI / package maintenance
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - Task has clear acceptance criteria.
        - Public API changes are documented.
        - Generated output is not committed.
    validations:
      required: true
