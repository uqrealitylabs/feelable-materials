name: Asset import
description: Model, texture, audio, animation, XR asset, package, or plugin import issue.
title: "[ASSET]: "
body:
  - type: input
    id: summary
    attributes:
      label: Summary line
      description: One sentence describing the import issue.
      placeholder: FBX character imports without animation clips.
    validations:
      required: true
  - type: input
    id: asset_type
    attributes:
      label: Asset/tool type
      placeholder: Model, texture, audio, animation, XR package, plugin
    validations:
      required: true
  - type: input
    id: source_format
    attributes:
      label: Source format
      placeholder: FBX, GLB, PNG, WAV, Unity package, Unreal plugin
    validations:
      required: true
  - type: input
    id: target_engine
    attributes:
      label: Target engine
      placeholder: Unity, Unreal, Godot, Blender, WebXR
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What failed or looks wrong after import?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: File size / source notes
      description: Do not upload paid assets, private keys, licence files, or huge binaries.
      placeholder: |
        Source/licence:
        Approx size:
        External link:
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - Asset imports in the target engine.
        - Licence/source is clear.
        - Generated caches and private packages are not committed.
    validations:
      required: true
