name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        id: release
        with:
          config-file: tools/config/release-please.json
          manifest-file: tools/config/release-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

  package-artifacts:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
      - run: |
          set -euo pipefail
          npm ci
          npm run test:ci
      - run: |
          set -euo pipefail
          mkdir -p artifacts
          npm pack --pack-destination artifacts
          shasum -a 256 artifacts/*.tgz > artifacts/SHA256SUMS
          find artifacts -maxdepth 1 -type f | sort > artifacts/package-manifest.txt
      - run: |
          set -euo pipefail
          export RELEASE_TAG="${{ needs.release-please.outputs.tag_name }}"
          npm run release:codename -- "${RELEASE_TAG}"
          node tools/scripts/release/update-github-release.ts "${RELEASE_TAG}"
          gh release upload "${RELEASE_TAG}" artifacts/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
